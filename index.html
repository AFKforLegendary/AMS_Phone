<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS_Phone 看板中心</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; background:#f6f8fa; color:#24292f; margin:0; padding:0; }
  .wrap { max-width: 760px; margin: 60px auto; padding: 0 20px; }
  h1 { font-size: 26px; margin-bottom: 8px; }
  .sub { color:#57606a; font-size:15px; margin-bottom:32px; }
  .card { background:#fff; border:1px solid #d0d7de; border-radius:12px; padding:24px; }
  .ok { display:inline-block; background:#dafbe1; color:#1a7f37; font-size:13px; padding:4px 10px; border-radius:20px; }
  .list { margin-top:20px; color:#57606a; font-size:14px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>AMS_Phone 看板中心</h1>
    <div class="sub">对外看板发布站点 · 由 WorkBuddy 自动维护</div>
    <div class="card">
      <span class="ok">Pages 已正常运行</span>
      <div class="list">
        <p>此站点用于发布对外看板。后续每个看板都会作为独立页面发布在本站点下。</p>
        <p>看板列表将在这里陆续更新。</p>
      </div>
    </div>
  </div>
</body>
</html>
